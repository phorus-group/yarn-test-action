name: Yarn Test Action
description: An action to test

inputs:
  command:
    description: "The yarn command to run"
    required: false
    default: test
  node-version:
    description: "The node version to use"
    required: false
    default: "22"
  coverage-summary-location:
    description: "Location of the coverage summary"
    required: false
    default: "./test/.coverage/coverage-summary.json"
  coverage-report-location:
    description: "Location of the coverage report for Codecov upload. Supports cobertura XML, lcov, and other Codecov-supported formats."
    required: false
    default: "./test/.coverage/cobertura-coverage.xml"
  junit-report-location:
    description: "Location of the junit.xml report"
    required: false
    default: "./test/.coverage/junit.xml"
  test-label:
    description: "Label for the coverage summary, such as Unit or Integration"
    required: false
    default: ""
  enable-codecov:
    description: "Set to true to upload coverage to Codecov"
    required: false
    default: "false"
  codecov-token:
    description: "Codecov token for private repos. Public repos can leave this empty."
    required: false
    default: ""
outputs:
  total-lines:
    description: "Total lines to cover with tests"
    value: ${{ steps.report-coverage.outputs.total-lines }}
  lines-covered:
    description: "Total lines covered with tests"
    value: ${{ steps.report-coverage.outputs.lines-covered }}
  coverage-percentage:
    description: "The coverage percentage"
    value: ${{ steps.report-coverage.outputs.coverage-percentage }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version:  ${{ inputs.node-version }}
        cache: 'yarn'

    - name: "Run yarn install"
      shell: bash
      run: yarn install --immutable

    - name: "Run tests"
      id: test
      run: |
        rm -rf ${{ inputs.coverage-summary-location }}

        yarn ${{ inputs.command }}
      shell: bash

    - name: "Report coverage"
      id: report-coverage
      if: ${{ !cancelled() }}
      shell: bash
      run: |
        LABEL="${{ inputs.test-label }}"
        if [ -n "$LABEL" ]; then
          HEADER="${LABEL} Test Coverage"
        else
          HEADER="Test Coverage"
        fi

        if [ -f ${{ inputs.coverage-summary-location }} ]; then
          TOTAL_LINES=$(jq '.total.lines.total' ${{ inputs.coverage-summary-location }})
          LINES_COVERED=$(jq '.total.lines.covered' ${{ inputs.coverage-summary-location }})
          COVERAGE_PERCENTAGE=$(jq '.total.lines.pct | .*100.0 + 0.5|floor/100.0' ${{ inputs.coverage-summary-location }})

          echo "$LINES_COVERED / $TOTAL_LINES lines covered"
          echo "$COVERAGE_PERCENTAGE% covered"

          echo "total-lines=$TOTAL_LINES" >> "$GITHUB_OUTPUT"
          echo "lines-covered=$LINES_COVERED" >> "$GITHUB_OUTPUT"
          echo "coverage-percentage=$COVERAGE_PERCENTAGE" >> "$GITHUB_OUTPUT"

          MISSED=$((TOTAL_LINES - LINES_COVERED))
          echo "## ${HEADER}" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${COVERAGE_PERCENTAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Covered | $LINES_COVERED |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Missed | $MISSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Lines | $TOTAL_LINES |" >> $GITHUB_STEP_SUMMARY
        else
          echo -e "\e[33mCoverage summary not found!\e[0m"
          echo "## ${HEADER}" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report not available." >> $GITHUB_STEP_SUMMARY
        fi

    - name: "Process junit report"
      id: process-junit-report
      if: ${{ !cancelled() }}
      shell: bash
      run: |
        if [ -f ${{ inputs.junit-report-location }} ]; then
          echo "junit-report=true" >> "$GITHUB_OUTPUT"
        else
          echo -e "\e[33mJunit report not found!\e[0m"
          echo "junit-report=false" >> "$GITHUB_OUTPUT"
        fi

    - name: "Report test summary"
      if: ${{ !cancelled() && steps.process-junit-report.outputs.junit-report == 'true' }}
      uses: test-summary/action@v2
      with:
        paths: ${{ inputs.junit-report-location }}

    - name: "Upload coverage to Codecov"
      if: ${{ !cancelled() && inputs.enable-codecov == 'true' }}
      uses: codecov/codecov-action@v5
      with:
        files: ${{ inputs.coverage-report-location }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
